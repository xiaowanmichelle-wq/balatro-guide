<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balatro 小丑 Tier List - 150张全覆盖</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0d0d14;
    color: #e8e8f0;
}

.container {
    width: 1400px;
    margin: 0 auto;
    padding: 40px 30px;
}

/* 标题区域 */
.header {
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 3px solid #ffd700;
}

.header h1 {
    font-size: 2.6rem;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    margin-bottom: 8px;
    letter-spacing: 2px;
}

.header .subtitle {
    font-size: 1.1rem;
    color: #8888a0;
}

.header .subtitle span {
    color: #ffd700;
    font-weight: bold;
}

.header .version {
    font-size: 0.85rem;
    color: #555566;
    margin-top: 6px;
}

/* 图例 */
.legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
    padding: 10px 0;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
}

.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

/* Tier 行 */
.tier-row {
    display: flex;
    margin-bottom: 4px;
    min-height: 90px;
    background: #1a1a28;
    border-radius: 8px;
    overflow: hidden;
}

.tier-label {
    width: 110px;
    min-width: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.tier-letter {
    font-size: 1.5rem;
    font-weight: 900;
    line-height: 1;
}

.tier-desc {
    font-size: 0.65rem;
    font-weight: 400;
    opacity: 0.95;
    margin-top: 4px;
    text-align: center;
    line-height: 1.2;
}

.tier-count {
    font-size: 0.6rem;
    opacity: 0.7;
    margin-top: 2px;
}

.tier-cards {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 14px;
    align-items: flex-start;
    align-content: flex-start;
    border-left: 1px solid rgba(255,255,255,0.05);
}

/* 单张卡牌 */
.card-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 68px;
    gap: 2px;
}

.card-img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.08);
    transition: transform 0.2s;
}

/* 稀有度边框 */
.card-item.legendary .card-img {
    border-color: rgba(243, 156, 18, 0.5);
    box-shadow: 0 0 8px rgba(243, 156, 18, 0.2);
}

.card-item.rare .card-img {
    border-color: rgba(52, 152, 219, 0.4);
    box-shadow: 0 0 6px rgba(52, 152, 219, 0.15);
}

/* 夯 tier 特殊发光 */
.tier-row.tier-夯 .card-img {
    border-color: rgba(255, 71, 87, 0.5);
    box-shadow: 0 0 10px rgba(255, 71, 87, 0.25);
}

.card-name {
    font-size: 0.55rem;
    color: #a0a0b0;
    text-align: center;
    line-height: 1.15;
    max-width: 68px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* 夯 tier 名字高亮 */
.tier-row.tier-夯 .card-name { color: #ff8a95; font-weight: 600; }
.tier-row.tier-顶级 .card-name { color: #ffcc70; }

/* 底部水印 */
.footer {
    text-align: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 2px solid #2a2a3a;
}

.footer .url {
    font-size: 1rem;
    color: #ffd700;
    font-weight: bold;
    letter-spacing: 1px;
}

.footer .features {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
}

.footer .feature {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: #8888a0;
}

.footer .feature .icon {
    font-size: 1.1rem;
}

.footer .info {
    font-size: 0.8rem;
    color: #555566;
    margin-top: 8px;
}

/* 模式切换 Tab */
.mode-tabs {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
}

.mode-btn {
    padding: 10px 36px;
    font-size: 1.1rem;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #8888a0;
    background: #1a1a28;
    border: 2px solid #333;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
}

.mode-btn:hover {
    border-color: #ffd700;
    color: #e8e8f0;
}

.mode-btn.active {
    background: linear-gradient(135deg, rgba(255, 165, 2, 0.15), rgba(255, 71, 87, 0.15));
    color: #ffd700;
    border-color: #ffd700;
    font-weight: 700;
    box-shadow: 0 0 16px rgba(255, 215, 0, 0.15);
}

/* 加载状态 */
.loading {
    text-align: center;
    padding: 60px;
    color: #8888a0;
    font-size: 1.2rem;
}

.loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid #333;
    border-top-color: #ffd700;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="container" id="tierlist">
    <div class="header">
        <h1>🃏 Balatro 小丑 Tier List</h1>
        <div class="subtitle"><span>150</span> 张小丑牌完整评级 · 前八轮 / 无限轮 分开评价</div>
        <div class="version">基于当前版本 · 制作：Balatro 新手助手</div>
    </div>

    <div class="mode-tabs">
        <button class="mode-btn active" onclick="switchMode('early')">🎯 前八轮 (Ante 1-8)</button>
        <button class="mode-btn" onclick="switchMode('endless')">♾️ 无限轮 (Endless)</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div><span style="color:#f39c12">传说</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div><span style="color:#3498db">稀有</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#95a5a6"></div><span style="color:#95a5a6">普通</span></div>
    </div>

    <div id="tiers">
        <div class="loading"><span class="spinner"></span>正在加载卡牌数据...</div>
    </div>

    <div class="footer">
        <div class="url">🔗 xiaowanmichelle-wq.github.io/balatro-guide</div>
        <div class="features">
            <div class="feature"><span class="icon">📚</span> 260+ 张卡牌图鉴</div>
            <div class="feature"><span class="icon">🎯</span> 智能牌组匹配</div>
            <div class="feature"><span class="icon">💡</span> 21 种流派攻略</div>
            <div class="feature"><span class="icon">🌱</span> 种子分享社区</div>
            <div class="feature"><span class="icon">🌐</span> 中/英/日三语</div>
        </div>
        <div class="info">Balatro 新手助手 · 免费在线工具 · #Balatro #小丑牌 #攻略</div>
    </div>
</div>

<script src="data.js"></script>
<script>
// 从 data.js 构建 id → {name, image, rarity} 映射
const cardMap = {};
if (typeof CARD_DATA !== 'undefined' && CARD_DATA.jokers) {
    CARD_DATA.jokers.forEach(j => {
        cardMap[j.id] = { name: j.name, image: j.image, rarity: j.rarity };
    });
}

const tierMeta = [
    { key: '夯', color: '#ff4757', desc: '版本之子\n无脑拿' },
    { key: '顶级', color: '#ffa502', desc: '极强\n核心构筑基石' },
    { key: '人上人', color: '#ffd700', desc: '强力\n大部分构筑优秀' },
    { key: 'NPC', color: '#2ed573', desc: '可用\n有合适构筑能发挥' },
    { key: '拉', color: '#70a1ff', desc: '偏弱\n场景局限' },
    { key: '拉完了', color: '#a0a0a0', desc: '实在没牌了\n才会选' }
];

const tierCardsByMode = {
    early: {
        '夯': ['j_blueprint','j_brainstorm','j_triboulet','j_hologram','j_hanging_chad','j_cavendish','j_canio'],
        '顶级': ['j_perkeo','j_yorick','j_duo','j_tribe','j_blackboard','j_driver_license','j_obelisk','j_vampire','j_card_sharp','j_seeing_double','j_invisible','j_burnt','j_hack','j_cartomancer','j_stuntman','j_shoot_moon','j_swashbuckler','j_riff_raff','j_constellation','j_mime','j_throwback','j_fortune_teller','j_fibonacci','j_chicot','j_wee','j_photograph','j_baseball','j_misprint','j_bootstraps','j_spare_trousers','j_gros_michel','j_abstract','j_castle'],
        '人上人': ['j_baron','j_dna','j_ancient','j_steel','j_dusk','j_acrobat','j_madness','j_ramen','j_certificate','j_erosion','j_delayed','j_rocket','j_to_moon','j_bull','j_sock','j_ceremonial','j_flower_pot','j_stencil','j_trio','j_family','j_order','j_smeared','j_mr_bones','j_mad','j_jolly','j_droll','j_four_fingers','j_shortcut','j_golden','j_half'],
        'NPC': ['j_hit_road','j_merry_andy','j_midas','j_astronomer','j_loyalty','j_campfire','j_clever','j_sly','j_bloodstone','j_arrowhead','j_onyx','j_pareidolia','j_egg','j_cloud9','j_splash','j_burglar','j_runner','j_flash','j_ride_bus','j_hallucination','j_marble','j_mystic_summit','j_raised_fist','j_even_steven','j_green','j_red','j_vagabond','j_square','j_supernova','j_scary_face','j_smiley','j_mail_in'],
        '拉': ['j_glass','j_crazy','j_rough_gem','j_showman','j_chaos','j_turtle_bean','j_drunkard','j_gift_card','j_satellite','j_seltzer','j_walkie','j_greedy','j_lusty','j_wrathful','j_gluttonous','j_zany','j_devious','j_crafty','j_banner','j_odd_todd','j_scholar','j_hiker','j_space','j_stone','j_blue','j_credit_card','j_popcorn','j_ice_cream','j_juggler','j_troubadour','j_todo','j_golden_ticket','j_diet_cola'],
        '拉完了': ['j_lucky_cat','j_joker','j_trading','j_matador','j_oops_6','j_luchador','j_business_card','j_faceless','j_idol','j_wily','j_superposition','j_sixth_sense','j_seance','j_8ball','j_reserved']
    },
    endless: {
        '夯': ['j_blueprint','j_brainstorm','j_triboulet','j_perkeo','j_hologram','j_baron','j_hanging_chad','j_cavendish','j_mime','j_wee'],
        '顶级': ['j_canio','j_blackboard','j_driver_license','j_vampire','j_dna','j_card_sharp','j_invisible','j_swashbuckler','j_constellation','j_throwback','j_fortune_teller','j_fibonacci','j_photograph','j_baseball','j_spare_trousers','j_trio','j_family'],
        '人上人': ['j_yorick','j_duo','j_tribe','j_obelisk','j_seeing_double','j_steel','j_burnt','j_hack','j_stuntman','j_shoot_moon','j_chicot','j_madness','j_rocket','j_to_moon','j_misprint','j_bootstraps','j_sock','j_flower_pot','j_stencil','j_order','j_gros_michel','j_smeared','j_abstract','j_castle','j_droll','j_four_fingers','j_shortcut'],
        'NPC': ['j_ancient','j_dusk','j_cartomancer','j_riff_raff','j_acrobat','j_ramen','j_certificate','j_erosion','j_delayed','j_bull','j_hit_road','j_merry_andy','j_midas','j_ceremonial','j_astronomer','j_loyalty','j_campfire','j_mr_bones','j_mad','j_jolly','j_bloodstone','j_arrowhead','j_onyx','j_pareidolia','j_egg','j_splash','j_burglar','j_runner','j_flash','j_ride_bus','j_hallucination','j_half','j_marble','j_mystic_summit','j_raised_fist','j_even_steven','j_green','j_red','j_vagabond','j_square','j_supernova','j_scary_face','j_smiley','j_mail_in'],
        '拉': ['j_clever','j_sly','j_crazy','j_rough_gem','j_showman','j_golden','j_cloud9','j_chaos','j_turtle_bean','j_drunkard','j_gift_card','j_satellite','j_seltzer','j_walkie','j_greedy','j_lusty','j_wrathful','j_gluttonous','j_zany','j_devious','j_crafty','j_banner','j_odd_todd','j_scholar','j_hiker','j_space','j_stone','j_blue','j_credit_card','j_popcorn','j_ice_cream','j_juggler','j_troubadour','j_todo','j_golden_ticket','j_diet_cola'],
        '拉完了': ['j_lucky_cat','j_glass','j_joker','j_trading','j_matador','j_oops_6','j_luchador','j_business_card','j_faceless','j_idol','j_wily','j_superposition','j_sixth_sense','j_seance','j_8ball','j_reserved']
    }
};

function renderTiers(mode) {
    const container = document.getElementById('tiers');
    container.innerHTML = '';
    const modeCards = tierCardsByMode[mode];

    tierMeta.forEach(tier => {
        const ids = modeCards[tier.key];
        const row = document.createElement('div');
        row.className = `tier-row tier-${tier.key}`;

        const cardsHTML = ids.map(id => {
            const c = cardMap[id];
            if (!c) return `<div class="card-item"><div class="card-img" style="display:flex;align-items:center;justify-content:center;font-size:0.5rem;color:#666">?</div><span class="card-name">${id}</span></div>`;
            return `<div class="card-item ${c.rarity}">
                <img class="card-img" src="${c.image}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
                <span class="card-name">${c.name}</span>
            </div>`;
        }).join('');

        row.innerHTML = `
            <div class="tier-label" style="background:${tier.color}">
                <span class="tier-letter">${tier.key}</span>
                <span class="tier-desc">${tier.desc.replace('\n','<br>')}</span>
                <span class="tier-count">${ids.length}张</span>
            </div>
            <div class="tier-cards">${cardsHTML}</div>
        `;
        container.appendChild(row);
    });
}

function switchMode(mode) {
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');
    renderTiers(mode);
}

// 默认渲染前八轮
renderTiers('early');
</script>
</body>
</html>
