<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balatro 小丑 Tier List - 150张全覆盖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0d0d14;
    color: #e8e8f0;
}

.container {
    width: 1200px;
    margin: 0 auto;
    padding: 40px 30px;
}

/* 标题区域 */
.header {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 3px solid #ffd700;
}

.header h1 {
    font-size: 2.6rem;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    margin-bottom: 8px;
    letter-spacing: 2px;
}

.header .subtitle {
    font-size: 1.1rem;
    color: #8888a0;
}

.header .subtitle span {
    color: #ffd700;
    font-weight: bold;
}

.header .version {
    font-size: 0.85rem;
    color: #555566;
    margin-top: 6px;
}

/* Tier 行 */
.tier-row {
    display: flex;
    margin-bottom: 3px;
    min-height: 80px;
    background: #1a1a28;
    border-radius: 8px;
    overflow: hidden;
}

.tier-label {
    width: 100px;
    min-width: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.tier-letter {
    font-size: 2.4rem;
    font-weight: 900;
    line-height: 1;
}

.tier-desc {
    font-size: 0.7rem;
    font-weight: 400;
    opacity: 0.95;
    margin-top: 4px;
    text-align: center;
    line-height: 1.2;
}

.tier-count {
    font-size: 0.6rem;
    opacity: 0.7;
    margin-top: 2px;
}

.tier-cards {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px 12px;
    align-items: center;
    align-content: center;
    border-left: 1px solid rgba(255,255,255,0.05);
}

.card-chip {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 0.78rem;
    font-weight: 500;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #d0d0e0;
    white-space: nowrap;
    transition: all 0.2s;
}

/* 按稀有度给卡牌名加颜色 */
.card-chip.legendary { color: #f39c12; border-color: rgba(243, 156, 18, 0.3); }
.card-chip.rare { color: #3498db; border-color: rgba(52, 152, 219, 0.3); }
.card-chip.common { color: #95a5a6; border-color: rgba(149, 165, 166, 0.2); }

/* S tier 特殊高亮 */
.tier-row.tier-S .card-chip {
    background: rgba(255, 71, 87, 0.08);
    border-color: rgba(255, 71, 87, 0.25);
    color: #ff8a95;
    font-weight: 600;
}

/* A tier */
.tier-row.tier-A .card-chip {
    background: rgba(255, 165, 2, 0.06);
    border-color: rgba(255, 165, 2, 0.2);
}

/* 底部水印 */
.footer {
    text-align: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 2px solid #2a2a3a;
}

.footer .url {
    font-size: 1rem;
    color: #ffd700;
    font-weight: bold;
    letter-spacing: 1px;
}

.footer .info {
    font-size: 0.8rem;
    color: #555566;
    margin-top: 6px;
}

.footer .features {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
}

.footer .feature {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: #8888a0;
}

.footer .feature .icon {
    font-size: 1.1rem;
}

/* 图例 */
.legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    padding: 10px 0;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
}

.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
</style>
</head>
<body>
<div class="container" id="tierlist">
    <div class="header">
        <h1>🃏 Balatro 小丑 Tier List</h1>
        <div class="subtitle"><span>150</span> 张小丑牌完整评级 · S → E 六档分级</div>
        <div class="version">基于当前版本 · 制作：Balatro 新手助手</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div><span style="color:#f39c12">传说</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div><span style="color:#3498db">稀有</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#95a5a6"></div><span style="color:#95a5a6">普通</span></div>
    </div>

    <div id="tiers"></div>

    <div class="footer">
        <div class="url">🔗 xiaowanmichelle-wq.github.io/balatro-guide</div>
        <div class="features">
            <div class="feature"><span class="icon">📚</span> 260+ 张卡牌图鉴</div>
            <div class="feature"><span class="icon">🎯</span> 智能牌组匹配</div>
            <div class="feature"><span class="icon">💡</span> 21 种流派攻略</div>
            <div class="feature"><span class="icon">🌱</span> 种子分享社区</div>
            <div class="feature"><span class="icon">🌐</span> 中/英/日三语</div>
        </div>
        <div class="info">Balatro 新手助手 · 免费在线工具 · #Balatro #小丑牌 #攻略</div>
    </div>
</div>

const container = document.getElementById('tiers');
tierData.forEach(tier => {
    const row = document.createElement('div');
    row.className = `tier-row tier-${tier.key}`;
    row.innerHTML = `
        <div class="tier-label" style="background:${tier.color}">
            <span class="tier-letter">${tier.key}</span>
            <span class="tier-desc">${tier.desc.replace('\n','<br>')}</span>
            <span class="tier-count">${tier.cards.length}张</span>
        </div>
        <div class="tier-cards">
            ${tier.cards.map(c => `<span class="card-chip ${c.r}">${c.n}</span>`).join('')}
        </div>
    `;
    container.appendChild(row);
});
</script>
</body>
</html>
